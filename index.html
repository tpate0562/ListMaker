<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Spice Inventory List Manager</title>
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SVG Icons via Phosphor Icons for a clean, premium look -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div class="background-animation"></div>

    <div class="container">
        <header class="glass-panel">
            <div class="header-content" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div class="logo">
                    <i class="ph-fill ph-google-logo"></i>
                    <h1>ASILM</h1>
                </div>
                <a href="static.html" style="color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.9rem; padding: 0.5rem 1rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; transition: var(--transition);" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='var(--primary-light)';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)';">View as static list</a>
            </div>
        </header>

        <main class="lists-container">
            <!-- Inventory Items Column -->
            <section class="list-panel glass-panel">
                <div class="panel-header">
                    <h2><i class="ph ph-package"></i> Grab and Go Inventory</h2>
                    <span class="count-badge" id="inventoryCount">0</span>
                </div>
                
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search inventory...">
                </div>
                
                <div class="list-wrapper" id="inventoryListWrapper">
                    <ul id="inventoryList" class="item-list">
                        <li class="empty-state">No items available. Add one below</li>
                    </ul>
                </div>

            </section>

            <!-- All Items Column -->
            <section class="list-panel glass-panel">
                <div class="panel-header">
                    <h2><i class="ph ph-list-bullets"></i> What we don't need</h2>
                    <span class="count-badge" id="availableCount">0</span>
                </div>
                
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="availableSearchInput" placeholder="Search all items...">
                </div>
                
                <div class="list-wrapper" id="availableListWrapper">
                    <ul id="availableList" class="item-list">
                        <li class="empty-state">No items available. Add one to inventory to see it here!</li>
                    </ul>
                </div>

                <div class="add-item-container">
                    <input type="text" id="newAvailableItemInput" placeholder="Add custom item...">
                    <button id="addAvailableItemBtn" class="primary-btn"><i class="ph ph-plus"></i> Add</button>
                </div>
            </section>

            <!-- Selected Items Column -->
            <section class="list-panel glass-panel highlighted">
                <div class="panel-header">
                    <h2><i class="ph ph-check-circle"></i> Items Needed</h2>
                    <span class="count-badge primary" id="selectedCount">0</span>
                </div>
                
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="neededSearchInput" placeholder="Search needed items...">
                </div>
                
                <div class="list-wrapper" id="selectedListWrapper">
                    <ul id="selectedList" class="item-list">
                        <li class="empty-state">No items selected yet.</li>
                    </ul>
                </div>
                

            </section>
        </main>
    </div>



    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <i class="ph ph-info"></i>
        <span id="toastMessage">Notification</span>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
