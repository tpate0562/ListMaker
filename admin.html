<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Casino Royale — Admin Panel for American Roulette">
  <title>Casino Royale — Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='56' font-size='56'>👑</text></svg>">
</head>
<body>

  <!-- ── Join Modal ──────────────────────────────────── -->
  <div id="join-modal" class="modal-overlay">
    <div class="modal">
      <h2>👑 Admin Panel</h2>
      <p>Log in to manage the roulette table</p>
      <input id="username-input" type="text" placeholder="Display Name" autocomplete="off">
      <input id="playerid-input" type="text" placeholder="Player ID (your secret key)" autocomplete="off">
      <button id="join-btn" class="btn-primary">Enter as Admin</button>
      <div id="join-error" class="error-msg"></div>
    </div>
  </div>

  <!-- ── Game Container ──────────────────────────────── -->
  <div id="game-container" class="hidden">
    <header>
      <h1>Casino Royale <span>Admin Console</span></h1>
      <div class="player-info">
        <span class="player-name" id="player-name-display"></span>
        <span class="player-balance" id="player-balance-display">$1000</span>
      </div>
    </header>

    <main>
      <section class="game-area">
        <!-- Wheel -->
        <div class="wheel-section">
          <canvas id="roulette-wheel"></canvas>
          <div id="result-banner" class="result-banner hidden"></div>
        </div>

        <!-- Table -->
        <div class="table-section">
          <div id="roulette-table" class="roulette-table"></div>
        </div>
      </section>

      <aside class="sidebar">
        <!-- Admin Controls -->
        <div class="sidebar-card">
          <h3>👑 Admin Controls</h3>
          <button id="spin-btn" class="spin-button">🎰 SPIN</button>
          <button id="new-round-btn" class="new-round-btn">🔄 New Round</button>
        </div>

        <!-- Chip Selector -->
        <div class="sidebar-card" id="chip-card">
          <h3>🪙 Select Chip</h3>
          <div class="chip-selector">
            <button class="chip" data-value="5">$5</button>
            <button class="chip" data-value="10">$10</button>
            <button class="chip selected" data-value="25">$25</button>
            <button class="chip" data-value="50">$50</button>
            <button class="chip" data-value="100">$100</button>
            <button class="chip" data-value="500">$500</button>
          </div>
          <div class="custom-bet">
            <input id="custom-amount" type="number" min="1" placeholder="Custom $">
            <button id="set-custom-btn">Set</button>
          </div>
        </div>

        <!-- Your Bets -->
        <div class="sidebar-card">
          <h3>🎯 Your Bets</h3>
          <div id="your-bets-list" class="bets-list"></div>
          <div id="your-bet-total" class="bet-total">Total: $0</div>
        </div>

        <!-- All Bets -->
        <div class="sidebar-card">
          <h3>📡 Table Bets (Live)</h3>
          <div id="all-bets-list" class="bets-list"></div>
        </div>

        <!-- Game Status -->
        <div class="sidebar-card">
          <h3>🎲 Game Status</h3>
          <div id="game-phase-display"></div>
          <div id="history-strip" class="history-strip"></div>
        </div>

        <!-- Player Management -->
        <div class="sidebar-card">
          <h3>👥 Player Balances</h3>
          <div id="admin-players-list" class="player-list-admin"></div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="admin.js"></script>
</body>
</html>
